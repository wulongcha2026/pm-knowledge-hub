server {
    listen 443 ssl;
    server_name test.pm.xyzliving.com;

    # SSL 证书路径（手动配置）
    ssl_certificate /root/.openclaw/workspace/projects/pm-knowledge-hub/ssl/fullchain.pem;
    ssl_certificate_key /root/.openclaw/workspace/projects/pm-knowledge-hub/ssl/privkey.pem;

    # SSL 优化
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # 现代加密配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 日志配置
    access_log /var/log/nginx/pm-knowledge-hub-access.log;
    error_log /var/log/nginx/pm-knowledge-hub-error.log;

    # 最大上传大小
    client_max_body_size 50M;

    # Django 媒体文件
    location /media/ {
        alias /root/.openclaw/workspace/projects/pm-knowledge-hub/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Django 静态文件
    location /static/ {
        alias /root/.openclaw/workspace/projects/pm-knowledge-hub/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 代理到 Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name test.pm.xyzliving.com;
    return 301 https://$server_name$request_uri;
}
