{% extends 'base.html' %}

{% block title %}登录 - PM Knowledge Hub{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4">
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">🔐 用户登录</h1>
        <form method="post">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" name="username" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" name="password" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
            <button type="submit" class="w-full mt-6 bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">
                登录
            </button>
        </form>
        <div class="mt-4 text-center text-sm">
            <span class="text-gray-600">还没有账号？</span>
            <a href="{% url 'accounts:register' %}" class="text-blue-600 hover:text-blue-800">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}
