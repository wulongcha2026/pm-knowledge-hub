{% extends 'base.html' %}

{% block title %}创建风险评估 - PM Knowledge Hub{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4">
    <h1 class="text-3xl font-bold text-gray-900 mb-6">📝 创建风险评估</h1>
    
    <div class="bg-white rounded-lg shadow p-6">
        <form id="assessment-form">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">评估标题</label>
                    <input type="text" id="title" required 
                           class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
                           placeholder="例如：XX 项目风险评估">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">项目描述</label>
                    <textarea id="project_description" required rows="6"
                              class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
                              placeholder="请详细描述项目背景、目标、技术栈、团队规模等..."></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">会议纪要（可选）</label>
                    <textarea id="meeting_notes" rows="4"
                              class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
                              placeholder="如有会议纪要，请粘贴在此处..."></textarea>
                </div>
            </div>
            
            <div class="mt-6 flex gap-4">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700">
                    开始分析
                </button>
                <a href="{% url 'risk_agent:index' %}" class="text-gray-600 hover:text-gray-800">
                    取消
                </a>
            </div>
        </form>
        
        <!-- 加载状态 -->
        <div id="loading" class="hidden mt-6">
            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                <div class="flex items-center">
                    <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600 mr-3"></div>
                    <div>
                        <h3 class="font-semibold text-blue-900">AI 正在分析风险...</h3>
                        <div id="analysis-steps" class="text-sm text-blue-700 mt-2 space-y-1"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('assessment-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const data = {
        title: document.getElementById('title').value,
        project_description: document.getElementById('project_description').value,
        meeting_notes: document.getElementById('meeting_notes').value
    };
    
    // 显示加载状态
    document.getElementById('loading').classList.remove('hidden');
    const stepsContainer = document.getElementById('analysis-steps');
    
    try {
        const response = await fetch('{% url "risk_agent:analyze_api" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (result.error) {
            alert('错误：' + result.error);
        } else {
            // 分析完成，跳转到详情页
            window.location.href = '/risk/' + result.assessment_id + '/';
        }
    } catch (error) {
        alert('请求失败：' + error.message);
        document.getElementById('loading').classList.add('hidden');
    }
});

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
{% endblock %}
